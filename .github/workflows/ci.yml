name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    # Use a managed (python-build-standalone) interpreter rather than the
    # runner's system Python: importing main.py pulls in tkinter, which the
    # standalone build bundles but the system Python on the runner does not.
    env:
      UV_PYTHON_PREFERENCE: only-managed
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check --exclude main.py .

      - name: Mypy
        run: uv run mypy .

      - name: Pytest
        run: uv run pytest
